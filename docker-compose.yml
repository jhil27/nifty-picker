services:
  mongo:
    image: mongo:7
    container_name: nifty-picker-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: nifty
      MONGO_INITDB_ROOT_PASSWORD: nifty123
      MONGO_INITDB_DATABASE: niftypicker
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
